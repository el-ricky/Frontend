    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title text-center">
                <h2>Editar Sala</h2>
                <p>Modifica la información de las salas existentes</p>
            </div>

            <div id="alert-container"></div>

            <div class="form-containerPerfil">
                <div class="form-group mb-4">
                    <label for="seleccionar_sala">Seleccionar sala a editar:</label>
                    <select id="seleccionar_sala" class="form-control">
                        <option value="">-- Cargando salas... --</option>
                    </select>
                </div>

                <form id="formEditarSala" style="display: none;">
                    <input type="hidden" id="id_sala">
                    <input type="hidden" id="current_imagenUrl">

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label for="nombre">Nombre de la Sala:</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="capacidad">Capacidad:</label>
                                <input type="number" id="capacidad" class="form-control" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="precio">Precio por hora:</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" id="precio" class="form-control" step="0.01" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label for="descripcion">Descripción:</label>
                                <textarea id="descripcion" class="form-control" rows="4"></textarea>
                            </div>
                            <div class="form-group mb-3">
                                <label for="imagen">Cambiar Imagen (Opcional):</label>
                                <input type="file" id="imagen" class="form-control" accept="image/*">
                                <div id="preview-container" class="mt-2">
                                    <small class="text-muted">Imagen actual:</small><br>
                                    <img id="img-actual" src="" class="img-thumbnail" style="max-width: 150px;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <button type="submit" id="btnGuardar" class="btn btn-custom">Guardar Cambios</button>
                        <button type="button" id="btnEliminar" class="btn btn-danger">Eliminar Sala</button>
                        <a href="index_Administrador.php" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
