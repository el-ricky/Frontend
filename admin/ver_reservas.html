<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Reservas - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <script src="./js/header-component.js"></script>
</head>
<body>
    <mi-header></mi-header>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container-grande">
            <div class="section-title">
                <h2>Ver Reservas</h2>
                <p>Gestiona todas las reservas del sistema</p>
            </div>
            <div class="filters-container mb-4 p-3 bg-light rounded">
                <div class="row g-3">
                    <div class="col-md-3">
                        <input type="text" id="filter-email" class="form-control" placeholder="Email del cliente">
                    </div>
                    <div class="col-md-3">
                        <select id="filter-salon" class="form-control">
                            <option value="">Todos los salones</option>
                            </select>
                    </div>
                    <div class="col-md-3">
                        <input type="date" id="filter-fecha" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <select id="filter-orden" class="form-control">
                            <option value="DESC">Más recientes primero</option>
                            <option value="ASC">Más antiguas primero</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <button class="btn btn-custom" onclick="aplicarFiltros()">Buscar</button>
                    <div id="paginacion-controles">
                        <button class="btn btn-outline-secondary btn-sm" id="prev-page">Anterior</button>
                        <span id="current-page" class="mx-2">Página 1</span>
                        <button class="btn btn-outline-secondary btn-sm" id="next-page">Siguiente</button>
                    </div>
                </div>
            </div>
            <div class="table-responsive table-responsive-grande">
                <table class="table table-hover table-striped table-grande">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Fecha</th>
                            <th>Sala</th>
                            <th>Estado</th>
                            <th>Hora Inicio</th>
                            <th>Hora Fin</th>
                            <th>Cliente</th>
                            <th>Email</th>
                            <th>Servicio</th>
                            <th>Total</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-reservas">
                        <tr>
                            <td colspan="11" class="text-center">Cargando reservas...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/reservas.js"></script>
</body>
</html>
