<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Reservas - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="header">
        </header>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container-grande">
            <div class="section-title">
                <h2>Ver Reservas</h2>
                <p>Gestiona todas las reservas del sistema</p>
            </div>

            <div class="table-responsive table-responsive-grande">
                <table class="table table-hover table-striped table-grande">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Fecha</th>
                            <th>Sala</th>
                            <th>Estado</th>
                            <th>Hora Inicio</th>
                            <th>Hora Fin</th>
                            <th>Cliente</th>
                            <th>Email</th>
                            <th>Servicio</th>
                            <th>Total</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-reservas">
                        <tr>
                            <td colspan="11" class="text-center">Cargando reservas...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/reservas.js"></script>
</body>
</html>
