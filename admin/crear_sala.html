    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title text-center">
                <h2>Crear Nueva Sala</h2>
                <p>Agrega una nueva sala al sistema mediante la API</p>
            </div>

            <div id="alert-container"></div>

            <div class="form-containerPerfil">
                <form id="formCrearSala">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label for="nombre">Nombre de la Sala:</label>
                                <input type="text" id="nombre" name="nombre" class="form-control" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="capacidad">Capacidad:</label>
                                <input type="number" id="capacidad" name="capacidad" class="form-control" min="1" required>
                            </div>
                            <div class="form-group mb-3">
                                <label for="precio">Precio:</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" id="precio" name="precio" class="form-control" step="0.01" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group mb-3">
                                <label for="descripcion">Descripción:</label>
                                <textarea id="descripcion" name="descripcion" class="form-control" rows="5" maxlength="255"></textarea>
                            </div>
                            <div class="form-group mb-3">
                                <label for="imagen">Imagen de la Sala:</label>
                                <input type="file" id="imagen" name="imagen" class="form-control" accept="image/*" required>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <button type="submit" id="btnGuardar" class="btn btn-custom me-md-2">Guardar Sala</button>
                        <a href="index_Administrador.php" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
