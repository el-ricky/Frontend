<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <mi-header></mi-header> <script src="./js/header-component.js"></script>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Panel de Administración</h2>
                <p>Reservas agregadas recientemente</p>
            </div>

            <div class="container container-grande">
                <div class="table-responsive">
                    <table class="table table-hover table-striped" id="tablaReservas">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Fecha</th>
                                <th>Sala</th>
                                <th>Estado Pago</th>
                                <th>Hora Inicio</th>
                                <th>Hora Fin</th>
                                <th>Cliente</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="listaReservas">
                            <tr>
                                <td colspan="8" class="text-center">Cargando reservas...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3 bg-light p-2 rounded">
                    <div>
                        <small class="text-muted" id="info-registro">Mostrando próximas reservas</small>
                    </div>
                    <div class="d-flex align-items-center">
                        <button class="btn btn-outline-secondary btn-sm me-2" id="prev-page">
                            &laquo; Anterior
                        </button>
                        <span id="current-page" class="fw-bold mx-2">Página 1</span>
                        <button class="btn btn-outline-secondary btn-sm ms-2" id="next-page">
                            Siguiente &raquo;
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/admin_dash.js"></script>
    <script src="./js/logout.js"></script>
</body>
</html>
