<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <a href="dashboard_admin.html">
                <img src="../img/Logo.png" alt="Logo" class="namedly-icon">
            </a>
        </div>

        <nav class="nav-bar">
            <ul class="nav-menu">
                <li><a href="admin_dashboard.html" class="active">Inicio</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Salas</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="crear_sala.html">Crear sala</a></li>
                        <li><a class="dropdown-item" href="editar_sala.html">Editar sala</a></li>
                    </ul>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Reservas</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="ver_reservas.html">Ver reservas</a></li>
                        <li><a class="dropdown-item" href="editar_reserva.html">Editar reservas</a></li>
                    </ul>
                </li>
                <li><a href="ver_usuarios.html">Usuarios</a></li>
                <li><a href="ver_reportes.html">Reportes</a></li>
            </ul>
        </nav>
        <button id="btnLogout" class="btn btn-custom">Cerrar Sesión</button>
    </header>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Panel de Administración</h2>
                <p>Reservas agregadas recientemente</p>
            </div>

            <div class="container container-grande">
                <div class="table-responsive">
                    <table class="table table-hover table-striped" id="tablaReservas">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Fecha</th>
                                <th>Sala</th>
                                <th>Estado Pago</th>
                                <th>Hora Inicio</th>
                                <th>Hora Fin</th>
                                <th>Cliente</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="listaReservas">
                            <tr>
                                <td colspan="8" class="text-center">Cargando reservas...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin_dash.js"></script>
    <script src="logout.js"></script>
</body>
</html>
