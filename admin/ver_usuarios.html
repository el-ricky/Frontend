<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <a href="admin_dashboard.html">
                <img src="../img/Logo.png" alt="Logo" class="namedly-icon">
            </a>
        </div>
        <nav class="nav-bar">
            <ul class="nav-menu">
                <li><a href="admin_dashboard.html">Inicio</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Salas</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="crear_sala.html">Crear sala</a></li>
                        <li><a class="dropdown-item" href="editar_sala.html">Editar sala</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Reservas</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="ver_reservas.html">Ver reservas</a></li>
                        <li><a class="dropdown-item" href="editar_reserva.html">Editar reservas</a></li>
                    </ul>
                </li>
                <li><a href="ver_usuarios.html" class="active">Usuarios</a></li>
                <li><a href="ver_reportes.html">Reportes</a></li>
            </ul>
        </nav>
        <button id="btnLogout" class="btn btn-custom">Cerrar Sesión</button>
    </header>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Listado de Personal</h2>
                <p>Gestiona los usuarios registrados en el sistema</p>
            </div>

            <!-- Filtros de búsqueda -->
            <div class="container container-grande mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label for="filtrNombre" class="form-label fw-semibold">Buscar por nombre:</label>
                        <input type="text" id="filtrNombre" class="form-control"
                            placeholder="Ej: Carlos">
                    </div>
                    <div class="col-md-4">
                        <label for="filtrEstado" class="form-label fw-semibold">Filtrar por estado:</label>
                        <select id="filtrEstado" class="form-select">
                            <option value="">Todos</option>
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button id="btnFiltrar" class="btn btn-custom w-100">Filtrar</button>
                        <button id="btnLimpiar" class="btn btn-outline-secondary w-100">Limpiar</button>
                    </div>
                </div>
            </div>

            <!-- Contador de resultados -->
            <div class="container container-grande mb-2">
                <small id="contadorResultados" class="text-muted"></small>
            </div>

            <!-- Tabla de usuarios -->
            <div class="container container-grande">
                <div class="table-responsive">
                    <table class="table table-hover table-striped" id="tablaUsuarios">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Nombre</th>
                                <th>Apellido Paterno</th>
                                <th>Apellido Materno</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaUsuarios">
                            <tr>
                                <td colspan="8" class="text-center">Cargando usuarios...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="ver_usuarios.js"></script>
    <script src="../logout.js"></script>
</body>
</html>
