<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Reserva - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="admin_dashboard.html" class="logo">
                <img src="../img/Logo.png" alt="Logo" class="namedly-icon">
            </a>
        </div>
        <nav class="nav-bar">
            <ul class="nav-menu">
                <li><a href="admin_dashboard.html">Inicio</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Salas
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="crear_sala.html">Crear sala</a></li>
                        <li><a class="dropdown-item" href="editar_sala.html">Editar sala</a></li>
                    </ul>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Reservas
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="ver_reservas.html">Ver reservas</a></li>
                        <li><a class="dropdown-item" href="editar_reserva.html">Editar reservas</a></li>
                    </ul>
                </li>
                <li><a href="ver_usuarios.html">Usuarios</a></li>
                <li><a href="ver_reportes.html">Reportes</a></li>
            </ul>
        </nav>
        <button id="btnLogout" class="btn btn-custom">Cerrar Sesión</button>
    </header>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Editar Reserva</h2>
                <p>Modifica la información de las reservas existentes</p>
            </div>

            <div id="alert-container"></div>

            <div class="form-containerPerfil">
                <div class="form-group mb-4">
                    <label for="seleccionar_reserva">Seleccionar reserva a editar:</label>
                    <select id="seleccionar_reserva" class="form-control">
                        <option value="">-- Seleccione una reserva --</option>
                    </select>
                </div>

                <form id="formReserva" style="display: none;">
                    <input type="hidden" id="id_reserva">
                    <input type="hidden" id="id_sala">
                    <input type="hidden" id="id_usuario">

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Sala (Solo lectura):</label>
                                <input type="text" id="nombre_sala" class="form-control" readonly>
                            </div>
                            <div class="form-group">
                                <label for="fecha">Fecha:</label>
                                <input type="date" id="fecha" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Precio Sala:</label>
                                <input type="text" id="precio_sala" class="form-control" readonly>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="hora_inicio">Hora Inicio:</label>
                                <input type="time" id="hora_inicio" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="hora_fin">Hora Fin:</label>
                                <input type="time" id="hora_fin" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="estado">Estado:</label>
                                <select id="estado" class="form-control" disabled>
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="Pagado">Pagada</option>
                                    <option value="Cancelado">Cancelada</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <button type="submit" class="btn btn-custom">Guardar Cambios</button>
                        <button type="button" class="btn btn-custom" onclick="window.history.back()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/editar_reserva.js"></script>
    <script src="./js/logout.js"></script>
</body>
</html>
