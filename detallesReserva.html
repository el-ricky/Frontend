<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--Verificación de seguridad (1) -->
    <script src="./js/auth-check.js"></script>
    
    <!-- CSS -->
    <title>Detalles de Reserva - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- Componentes reutilizables -->
    <script src="./js/header-cliente.js"></script>
    <script src="./js/footer-component.js"></script>
</head>

<body>
    
    <mi-header-cliente></mi-header-cliente>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Resumen de Reserva</h2>
                <p id="tituloSala">Detalles de tu reserva</p>
            </div>

            <!-- Mensajes -->
            <div id="mensajeAlerta" class="mb-4"></div>

            <!-- Spinner -->
            <div id="spinnerCarga" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2">Cargando detalles de la reserva...</p>
            </div>

            <!-- Contenedor principal (oculto hasta cargar) -->
            <div id="contenedorReserva" class="d-none">

                <!-- Botón Regresar arriba a la izquierda -->
                <div class="mb-3">
                    <a href="misreservas.html" class="btn btn-custom">
                        <i data-feather="arrow-left"></i> Regresar
                    </a>
                </div>

                <div class="form-containerPerfil">
                    <div class="row">

                        <!-- Columna izquierda: imagen y datos básicos -->
                        <div class="col-md-4">
                            <div class="text-center mb-4">
                                <img id="imagenSala"
                                    src="img/sala-default.jpg"
                                    alt="Imagen de la sala"
                                    class="img-fluid rounded shadow"
                                    style="max-height: 250px; width: 100%; object-fit: cover;">
                            </div>
                            <div class="form-group">
                                <label for="nombreSalaResumen">Nombre de la Sala:</label>
                                <input type="text" class="form-control" id="nombreSalaResumen" readonly>
                            </div>
                            <div class="form-group">
                                <label for="capacidadResumen">Capacidad:</label>
                                <input type="text" class="form-control" id="capacidadResumen" readonly>
                            </div>
                        </div>

                        <!-- Columna central: fecha, horas y servicio -->
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="fechaResumen">Fecha:</label>
                                <input type="text" class="form-control" id="fechaResumen" readonly>
                            </div>
                            <div class="form-group">
                                <label for="horaInicioResumen">Hora de inicio:</label>
                                <input type="text" class="form-control" id="horaInicioResumen" readonly>
                            </div>
                            <div class="form-group">
                                <label for="horaFinResumen">Hora de fin:</label>
                                <input type="text" class="form-control" id="horaFinResumen" readonly>
                            </div>
                            <div class="form-group">
                                <label for="servicioIncluido">Servicio incluido:</label>
                                <input type="text" class="form-control" id="servicioIncluido" readonly>
                            </div>
                        </div>

                        <!-- Columna derecha: pago, estado y botones -->
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="precioTotal">Precio Total:</label>
                                <input type="text" class="form-control" id="precioTotal" readonly
                                    style="font-weight: bold; color: #8a5c39; font-size: 1.2rem;">
                            </div>
                            <div class="form-group">
                                <label>Forma de Pago:</label>
                                <div class="alert alert-info text-center">
                                    <strong id="formaPago">PayPal</strong>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Estado Actual:</label>
                                <div id="estadoAlerta" class="alert text-center">
                                    <strong id="estadoTexto"></strong>
                                </div>
                            </div>

                            <!-- Botones inyectados por JS según el estado -->
                            <div id="divBotones" class="d-grid gap-2 mt-4"></div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Reserva no encontrada -->
            <div id="reservaNoEncontrada" class="d-none">
                <div class="alert alert-danger text-center">
                    <h4>Reserva no encontrada</h4>
                    <p>La reserva que buscas no existe o no tienes acceso a ella.</p>
                    <a href="misreservas.html" class="btn btn-custom mt-3">Volver a Mis Reservas</a>
                </div>
            </div>
        </div>
    </section>

     <!-- Footer  -->
    <mi-footer></mi-footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script> feather.replace(); </script>
    <script src="./js/detallesReserva.js"></script>
</body>

</html>
