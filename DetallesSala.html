<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de la Sala - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>

    <header class="header">
        <div class="logo">
            <a href="inicio.html" class="logo">
                <img src="../img/Logo.png" alt="Logo" class="namedly-icon">
            </a>
        </div>
        <nav class="nav-bar">
            <ul class="nav-menu">
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="SalasDisponibles.html">Reservar</a></li>
                <li><a href="inicio.html#nosotros">Nosotros</a></li>
                <li><a href="inicio.html#servicios">Servicios</a></li>
                <li><a href="inicio.html#contacto">Contacto</a></li>
            </ul>
        </nav>
        <button class="btn btn-custom">Cerrar Sesión</button>
    </header>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title text-center">
                <h2 id="titulo-pagina">Cargando detalles...</h2>
                <p id="subtitulo-nombre">Por favor espere</p>
            </div>

            <div id="loading-view" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>

            <div id="detalle-content" class="form-containerPerfil d-none">
                <div class="row">
                    <div class="col-md-6">
                        <div class="text-center mb-4">
                            <img id="sala-img" src="" alt="Imagen de la sala"
                                 class="img-fluid rounded shadow" 
                                 style="max-height: 400px; width: 100%; object-fit: cover;">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label class="fw-bold">Nombre de la Sala:</label>
                            <input type="text" id="sala-nombre" class="form-control" readonly>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label class="fw-bold">Capacidad:</label>
                                    <input type="text" id="sala-capacidad" class="form-control" readonly>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label class="fw-bold">Precio por hora:</label>
                                    <input type="text" id="sala-precio" class="form-control" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label class="fw-bold">Descripción:</label>
                            <textarea id="sala-descripcion" class="form-control" rows="5" 
                                      style="resize: none; background-color: #fff;" readonly></textarea>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                    <a id="btn-reservar" href="#" class="btn btn-custom me-md-2">Reservar Sala</a>
                    <a href="SalasDisponibles.html" class="btn btn-custom">ㅤㅤRegresarㅤㅤ</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/detallesSala.js"></script>
    <script src="./js/logout.js"></script>
</body>
</html>
