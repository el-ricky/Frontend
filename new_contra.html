<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio De Contraseña</title>
    <!-- Verificación de seguridad (1) -->
    <script src="./js/auth-check.js"></script>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <!-- Componentes reutilizables -->
    <script src="./js/header-cliente.js"></script>
    <script src="./js/footer-component.js"></script>

    <!-- Agrega esto en el <head> de cada página protegida -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
</head>
<body>
    <!-- Header -->
    <mi-header-cliente></mi-header-cliente>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Cambiar Contraseña</h2>
                <p>Actualiza tu contraseña de acceso</p>
            </div>
            <div class="form-container">
                <div id="mensaje"></div>
                <form id="formPassword">
                    <div class="form-group">
                        <label>Contraseña Actual:</label>
                        <input type="password" id="password_actual" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Nueva Contraseña:</label>
                        <input type="password" id="password_nueva" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Confirmar Contraseña:</label>
                        <input type="password" id="password_confirmar" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <button type="submit" class="btn btn-custom">
                            Guardar Cambios
                        </button>

                        <a href="perfil.html" class="btn btn-custom">
                            Descartar Cambios
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/feather-icons"></script>
    <script>
        feather.replace()
    </script>
    <script src="./js/new_contra.js"></script>
</body>
</html>
