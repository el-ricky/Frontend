<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Agrega esto en el <head> de cada página protegida -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Cambio De Contraseña</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="inicio.html">
                <img src="img/Logo.png" alt="Logo" class="namedly-icon">
            </a>
        </div>

        <nav class="nav-bar">
            <ul class="nav-menu">
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="SalasDisponibles.html">Reservar</a></li>
                <li><a href="inicio.html#nosotros">Nosotros</a></li>
                <li><a href="inicio.html#servicios">Servicios</a></li>
                <li><a href="inicio.html#contacto">Contacto</a></li>
            </ul>
        </nav>
        <button id="btnLogout" class="btn btn-custom">Cerrar Sesión</button>
    </header>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Cambiar Contraseña</h2>
                <p>Actualiza tu contraseña de acceso</p>
            </div>
            <div class="form-container">
                <div id="mensaje"></div>
                <form id="formPassword">
                    <div class="form-group">
                        <label>Contraseña Actual:</label>
                        <input type="password" id="password_actual" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Nueva Contraseña:</label>
                        <input type="password" id="password_nueva" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Confirmar Contraseña:</label>
                        <input type="password" id="password_confirmar" class="form-control" required>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <button type="submit" class="btn btn-custom">
                            Guardar Cambios
                        </button>

                        <a href="perfil.html" class="btn btn-custom">
                            Descartar Cambios
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/feather-icons"></script>
    <script>
        feather.replace()
    </script>
    <script src="new_contra.js"></script>
    <script src="logout.js"></script>
</body>
</html>
