<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - Tenex Reservas</title>
     <!--Verificacion de seguridad (1) -->
    <script src="./js/auth-check.js"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <!-- Componente reutilizables -->
    <script src="./js/header-cliente.js"></script>
    <script src="./js/footer-component.js"></script>
</head>

<body>
    <!-- Header -->
    <mi-header-cliente></mi-header-cliente>

    <section class="section-padding" style="margin-top: 5rem;">
        <style>
            .navbar-center .navbar-nav {
                width: 100%;
                justify-content: center;
            }
        </style>

        <nav class="navbar navbar-expand-lg bg-body-tertiary navbar-center">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" href="perfil.html">Mi perfil</a>
                        <a class="nav-link" href="SalasDisponibles.html">Reservar sala</a>
                        <a class="nav-link active" href="misreservas.html">Ver Reservas</a>
                    </div>
                </div>
            </div>
        </nav>
        
        <div class="container">
            <div class="section-title">
                <h2>Mis Reservas</h2>
                <p>Gestiona todas tus reservas en un solo lugar</p>
            </div>

            <!-- Contenedor para mensajes -->
            <div id="mensajeAlerta" class="mb-4"></div>

            <!-- Contenedor para cuando no hay reservas -->
            <div id="sinReservas" class="d-none">
                <div class="alert alert-info text-center">
                    <h4>No tienes reservas registradas</h4>
                    <p>¡Comienza explorando nuestras salas disponibles!</p>
                    <a href="SalasDisponibles.html" class="btn btn-custom mt-3">Ver Salas Disponibles</a>
                </div>
            </div>

            <!-- Botón Ver/Ocultar canceladas -->
            <div class="d-flex justify-content-end mb-3">
                <button id="btnVerCanceladas" class="btn btn-custom" onclick="toggleCanceladas()">
                    Ver canceladas
                </button>
            </div>

            <!-- Tabla de reservas -->
            <div id="tablaReservas" class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Reserva</th>
                            <th>Fecha</th>
                            <th>Sala</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-reservas-body">
                        <tr>
                            <td colspan="5" class="text-center py-4">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Cargando reservas...</span>
                                </div>
                                <p class="mt-2">Cargando tus reservas...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <mi-footer></mi-footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script> feather.replace(); </script>
    <!-- Script para cargar reservas -->
    <script src="./js/misreservas.js"></script>
    
</body>

</html>
