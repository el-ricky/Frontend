<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realizar Reserva - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <header class="header">
        <div class="logo">
            <a href="inicio.html" class="logo">
                <img src="img/Logo.png" alt="Logo" class="namedly-icon">
            </a>
        </div>
        <nav class="nav-bar">
            <ul class="nav-menu">
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="SalasDisponibles.html">Reservar</a></li>
                <li><a href="inicio.html#nosotros">Nosotros</a></li>
                <li><a href="inicio.html#servicios">Servicios</a></li>
                <li><a href="inicio.html#contacto">Contacto</a></li>
            </ul>
        </nav>
        <button id="btnLogout" class="btn btn-custom">Cerrar Sesión</button>
    </header>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Realizar Reserva</h2>
                <p id="nombre_sala_titulo">Cargando información de la sala...</p>
            </div>

            <div class="form-containerPerfil">
                <form id="reservaForm">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="text-center mb-4">
                                <img id="imagen_sala" src="img/placeholder.jpg"
                                    alt="Imagen de la sala"
                                    class="img-fluid rounded shadow"
                                    style="max-height: 250px; width: 100%; object-fit: cover;">
                            </div>

                            <div class="form-group mb-3">
                                <label>Sala seleccionada:</label>
                                <select class="form-control" id="id_salon" disabled>
                                    </select>
                            </div>

                            <div class="form-group mb-3">
                                <label>Presupuesto Estimado:</label>
                                <div class="h4 text-primary" id="total_pagar_display">$0.00</div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="form-group mb-3">
                                <label for="fecha">Fecha de reserva:</label>
                                <input type="date" class="form-control" id="fecha" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="hora_inicio">Hora de inicio:</label>
                                <input type="time" class="form-control" id="hora_inicio" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="hora_fin">Hora de fin:</label>
                                <input type="time" class="form-control" id="hora_fin" required>
                            </div>
                            
                            <div id="statusDisponibilidad" class="mt-2"></div>
                        </div>

                        <div class="col-md-4">
                            <div class="form-group mb-3">
                                <label for="id_servicio">Servicio adicional:</label>
                                <select class="form-control" id="id_servicio" required>
                                    <option value="" disabled selected>Cargando servicios...</option>
                                </select>
                            </div>

                            <div class="mt-4 pt-3 border-top">
                                <div class="d-grid gap-2">
                                    <button type="submit" id="btnConfirmar" class="btn btn-custom" disabled>
                                        Confirmar Reserva
                                    </button>
                                    <a href="SalasDisponibles.html" class="btn btn-outline-secondary"
                                        onclick="return confirm('¿Estás seguro de que quieres salir?');">
                                        Cancelar
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Tenex Reservas. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/crear_reserva.js"></script>
</body>
</html>
