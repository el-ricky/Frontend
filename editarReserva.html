<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Reserva - Tenex Reservas</title>

    <!-- Verificación de seguridad (1) -->
    <script src="./js/auth-check.js"></script>
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/feather-icons"></script>


     <!-- Componentes reutilizables -->
    <script src="./js/header-cliente.js"></script>
    <script src="./js/footer-component.js"></script>

    <style>
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        input[readonly], select[disabled] {
            background-color: #f5f5f5 !important;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

     <!-- Header -->
    <mi-header-cliente></mi-header-cliente>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Editar Reserva</h2>
                <p id="nombre_sala_titulo">Cargando información de la reserva...</p>
            </div>

            <!-- Mensajes -->
            <div id="mensajeAlerta" class="mb-4"></div>

            <div class="form-containerPerfil">
                <form id="editarReservaForm">
                    <div class="row">

                        <!-- Columna izquierda: imagen y sala -->
                        <div class="col-md-4">
                            <div class="text-center mb-4">
                                <img id="imagen_sala"
                                    src="img/sala-default.jpg"
                                    alt="Imagen de la sala"
                                    class="img-fluid rounded shadow"
                                    style="max-height: 250px; width: 100%; object-fit: cover;">
                            </div>

                            <div class="form-group mb-3">
                                <label>Sala seleccionada:</label>
                                <input type="text" class="form-control" id="nombre_sala" readonly>
                            </div>

                            <div class="form-group mb-3">
                                <label>Capacidad:</label>
                                <input type="text" class="form-control" id="capacidad_sala" readonly>
                            </div>

                            <div class="form-group mb-3">
                                <label>Precio Total:</label>
                                <input type="text" class="form-control" id="total_pagar_display" readonly
                                    style="font-weight: bold; color: #8a5c39; font-size: 1.1rem;">
                            </div>
                        </div>

                        <!-- Columna central: fecha editable + horas readonly -->
                        <div class="col-md-4">

                            <!-- FECHA: único campo editable -->
                            <div class="form-group mb-3">
                                <label for="fecha">
                                    Fecha de reserva:
                                    <span class="badge bg-warning text-dark ms-1" style="font-size:0.7rem;">Editable</span>
                                </label>
                                <input type="date" class="form-control" id="fecha" required>
                                <small class="text-muted">Solo puedes cambiar la fecha de tu reserva.</small>
                            </div>

                            <div id="statusDisponibilidad" class="mb-3"></div>

                            <!-- Horas: solo lectura -->
                            <div class="form-group mb-3">
                                <label>Hora de inicio:</label>
                                <input type="text" class="form-control" id="hora_inicio" readonly>
                            </div>

                            <div class="form-group mb-3">
                                <label>Hora de fin:</label>
                                <input type="text" class="form-control" id="hora_fin" readonly>
                            </div>
                        </div>

                        <!-- Columna derecha: servicio y botones -->
                        <div class="col-md-4">
                            <div class="form-group mb-3">
                                <label>Servicio adicional:</label>
                                <input type="text" class="form-control" id="nombre_servicio" readonly>
                            </div>

                            <div class="mt-4 pt-3 border-top">
                                <div class="d-grid gap-2">
                                    <button type="submit" id="btnGuardar" class="btn btn-custom" disabled>
                                        Guardar Cambios
                                    </button>
                                    <button type="button" class="btn btn-custom" onclick="confirmarCancelar()">
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Tenex Reservas. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/editarReserva.js"></script>
</body>
</html>
