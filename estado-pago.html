<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado del Pago - Tenex Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="inicio.html"><img src="img/Logo.png" alt="Logo" class="namedly-icon"></a>
        </div>
        <nav class="nav-bar">
            <ul class="nav-menu">
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="SalasDisponibles.html">Reservar</a></li>
            </ul>
        </nav>
    </header>

    <section class="section-padding d-flex align-items-center" style="margin-top: 8rem; min-height: 60vh;">
        <div class="container text-center">
            <div id="status-card" class="card shadow-lg p-5 border-0 mx-auto" style="max-width: 600px; border-radius: 15px;">
                <div id="status-icon" class="mb-4">
                    </div>
                <h2 id="status-title" class="mb-3">Procesando pago...</h2>
                <p id="status-message" class="text-muted mb-4">
                    Estamos verificando el estado de tu transacción con Mercado Pago.
                </p>
                <div id="status-actions">
                    <a href="misreservas.html" class="btn btn-custom px-4">Ir a Mis Reservas</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/estado_pago.js"></script>
</body>
</html>
