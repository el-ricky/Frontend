<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - Tenex Reservas</title>
    <!-- Verificación de seguridad (1) -->
    <script src="./js/auth-check.js"></script>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- Componentes reutilizables -->
    <script src="./js/header-cliente.js"></script>
    <script src="./js/footer-component.js"></script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>

<body>
    <!-- Header -->
    <mi-header-cliente></mi-header-cliente>

    <section class="section-padding" style="margin-top: 5rem;">
        <div class="container">
            <div class="section-title">
                <h2>Editar Perfil</h2>
                <p>Actualiza tu información personal</p>
            </div>

            <div class="form-containerPerfil">

                <!-- Mensajes de éxito/error -->
                <div id="mensaje"></div>

                <form id="formCambios">
                    <div class="text-center mb-4">
                        <div class="d-inline-block p-4 rounded-circle bg-light">
                            <i data-feather="user" class="text-muted" style="width: 64px; height: 64px;"></i>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-8">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="nombre">Nombre(s):</label>
                                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="aPaterno">Apellido Paterno:</label>
                                        <input type="text" class="form-control" id="aPaterno" name="aPaterno" required>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="aMaterno">Apellido Materno:</label>
                                        <input type="text" class="form-control" id="aMaterno" name="aMaterno">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label for="telefono">Teléfono:</label>
                                        <input type="text" class="form-control" id="telefono" name="telefono">
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="email">Correo electrónico:</label>
                                <input type="email" class="form-control" id="email" name="email" readonly>
                            </div>

                            <div class="form-group">
                                <label for="direccion">Dirección:</label>
                                <input type="text" class="form-control" id="direccion" name="direccion">
                            </div>
                        </div>

                        <!-- Tarjeta lateral con nombre del usuario -->
                        <div class="col-md-4 text-center">
                            <div class="service-card"
                                style="height: 100%; display: flex; flex-direction: column; justify-content: center;">
                                <div class="card-icon mb-3" style="font-size: 4rem; color: #8a5c39;">
                                    <i data-feather="user"></i>
                                </div>
                                <h4 id="nombreCompleto">Cargando...</h4>
                                <p class="text-muted">Miembro Tenex</p>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                        <button type="submit" class="btn btn-custom me-md-2">Guardar Cambios</button>
                        <a href="perfil.html" class="btn btn-custom me-md-2"
                            onclick="return confirm('¿Estás seguro de que quieres descartar los cambios?');">
                            Descartar Cambios
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <mi-footer></mi-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script> feather.replace(); </script>
    <script src="./js/editarPerfil.js"></script>
</body>
</html>
